<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <!-- <link rel="stylesheet" href="Styles/style.css"> -->
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>

        <div class="form-section">
            <label for="type">Type</label>
            <select id="type">
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
            </select>

            <label for="category">Category</label>
            <select id="category"></select>

            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" placeholder="Enter amount" min="0" step="0.01">

            <label for="date">Date</label>
            <input type="date" id="date">

            <button id="create-btn">CREATE</button>
        </div>

        <div id="transactions-list"></div>
    </div>

    <!-- totals and balance display -->
        <div id="total-income" style="font-weight:600; margin-bottom:0.25rem; color:green;"></div>
        <div id="total-expense" style="font-weight:600; margin-bottom:0.25rem; color:red;"></div>
        <div id="balance" style="font-weight:bold; margin-bottom:1rem;"></div>

    <style>
        table { width:100%; border-collapse: collapse; margin-top:1rem; }
        th, td { padding:0.5rem; border:1px solid #ccc; text-align:left; }
        .income { color:green; }
        .expense { color:red; }
    </style>
    <script src="./dist/app.js" type="module"></script>
</body>
</html>
